<svg width="1280" height="680" viewBox="0 0 1280 680" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AI Judge v3.1 cognitive evaluation map</title>
  <desc id="desc">Nine AI seats feed claim scoring and cognitive proxy profiling before a human final verdict.</desc>
  <rect width="1280" height="680" rx="30" fill="#080B16"/>
  <rect x="28" y="28" width="1224" height="624" rx="26" fill="#101827" stroke="#2B3856" stroke-width="2"/>

  <text x="640" y="82" text-anchor="middle" fill="#F8FAFC" font-family="Inter, ui-sans-serif, system-ui" font-size="46" font-weight="850">AI Judge v3.1</text>
  <text x="640" y="118" text-anchor="middle" fill="#AAB7CF" font-family="Inter, ui-sans-serif, system-ui" font-size="19">Claim scoring plus cognitive proxy signals, with the final verdict kept human.</text>

  <g transform="translate(70 174)">
    <rect width="250" height="312" rx="22" fill="#172033" stroke="#334260"/>
    <text x="125" y="42" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="21" font-weight="750">9 AI Seats</text>
    <text x="125" y="70" text-anchor="middle" fill="#94A3B8" font-family="Inter, ui-sans-serif, system-ui" font-size="13">independent answers</text>
    <g font-family="Inter, ui-sans-serif, system-ui" font-size="12" font-weight="800">
      <circle cx="62" cy="118" r="26" fill="#93C5FD"/><text x="62" y="123" text-anchor="middle" fill="#07111F">GPT</text>
      <circle cx="125" cy="118" r="26" fill="#C4B5FD"/><text x="125" y="123" text-anchor="middle" fill="#07111F">CLA</text>
      <circle cx="188" cy="118" r="26" fill="#FDE68A"/><text x="188" y="123" text-anchor="middle" fill="#07111F">GEM</text>
      <circle cx="62" cy="184" r="26" fill="#86EFAC"/><text x="62" y="189" text-anchor="middle" fill="#07111F">QWN</text>
      <circle cx="125" cy="184" r="26" fill="#FDA4AF"/><text x="125" y="189" text-anchor="middle" fill="#07111F">DSK</text>
      <circle cx="188" cy="184" r="26" fill="#FDBA74"/><text x="188" y="189" text-anchor="middle" fill="#07111F">KIM</text>
      <circle cx="62" cy="250" r="26" fill="#A7F3D0"/><text x="62" y="255" text-anchor="middle" fill="#07111F">GRK</text>
      <circle cx="125" cy="250" r="26" fill="#BFDBFE"/><text x="125" y="255" text-anchor="middle" fill="#07111F">YB</text>
      <circle cx="188" cy="250" r="26" fill="#DDD6FE"/><text x="188" y="255" text-anchor="middle" fill="#07111F">DB</text>
    </g>
  </g>

  <path d="M342 330H410" stroke="#60A5FA" stroke-width="5" stroke-linecap="round"/>
  <path d="M397 316L416 330L397 344" stroke="#60A5FA" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <g transform="translate(438 160)">
    <rect width="404" height="340" rx="24" fill="#10231C" stroke="#2F6B55"/>
    <text x="202" y="42" text-anchor="middle" fill="#DCFCE7" font-family="Inter, ui-sans-serif, system-ui" font-size="23" font-weight="800">Two Evaluation Lanes</text>
    <g transform="translate(28 76)">
      <rect width="160" height="226" rx="18" fill="#143426" stroke="#3C8B68"/>
      <text x="80" y="35" text-anchor="middle" fill="#BBF7D0" font-family="Inter, ui-sans-serif, system-ui" font-size="16" font-weight="800">Claim Scoring</text>
      <g fill="#D1FAE5" font-family="Inter, ui-sans-serif, system-ui" font-size="13">
        <text x="22" y="72">Bluff gate</text>
        <text x="22" y="101">Should bid</text>
        <text x="22" y="130">Allocation</text>
        <text x="22" y="159">Calibration</text>
        <text x="22" y="188">Graph value</text>
      </g>
    </g>
    <g transform="translate(216 76)">
      <rect width="160" height="226" rx="18" fill="#2D1F3F" stroke="#7650A8"/>
      <text x="80" y="35" text-anchor="middle" fill="#E9D5FF" font-family="Inter, ui-sans-serif, system-ui" font-size="16" font-weight="800">Cognitive Proxy</text>
      <g fill="#F3E8FF" font-family="Inter, ui-sans-serif, system-ui" font-size="13">
        <text x="20" y="72">Self-closure</text>
        <text x="20" y="101">Ambiguity flex</text>
        <text x="20" y="130">Recovery mode</text>
        <text x="20" y="159">Grounding</text>
        <text x="20" y="188">Dual scores</text>
      </g>
    </g>
  </g>

  <path d="M864 330H932" stroke="#F59E0B" stroke-width="5" stroke-linecap="round"/>
  <path d="M919 316L938 330L919 344" stroke="#F59E0B" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <g transform="translate(960 174)">
    <rect width="250" height="312" rx="22" fill="#2B2112" stroke="#8A6422"/>
    <text x="125" y="42" text-anchor="middle" fill="#FEF3C7" font-family="Inter, ui-sans-serif, system-ui" font-size="21" font-weight="800">Human Verdict</text>
    <text x="125" y="70" text-anchor="middle" fill="#D6B65F" font-family="Inter, ui-sans-serif, system-ui" font-size="13">machine assists, human decides</text>
    <rect x="42" y="106" width="166" height="46" rx="23" fill="#FDE68A"/>
    <text x="125" y="135" text-anchor="middle" fill="#111827" font-family="Inter, ui-sans-serif, system-ui" font-size="15" font-weight="850">Hard Truth L0-L4</text>
    <rect x="42" y="170" width="166" height="46" rx="23" fill="#FBBF24"/>
    <text x="125" y="199" text-anchor="middle" fill="#111827" font-family="Inter, ui-sans-serif, system-ui" font-size="15" font-weight="850">Blind Spots</text>
    <rect x="42" y="234" width="166" height="46" rx="23" fill="#F59E0B"/>
    <text x="125" y="263" text-anchor="middle" fill="#111827" font-family="Inter, ui-sans-serif, system-ui" font-size="15" font-weight="850">Next Evidence</text>
  </g>

  <g font-family="Inter, ui-sans-serif, system-ui" font-size="15" font-weight="800">
    <rect x="182" y="550" width="180" height="50" rx="25" fill="#1E293B" stroke="#334155"/>
    <text x="272" y="581" text-anchor="middle" fill="#CBD5E1">Claim ledger</text>
    <rect x="392" y="550" width="180" height="50" rx="25" fill="#1E293B" stroke="#334155"/>
    <text x="482" y="581" text-anchor="middle" fill="#CBD5E1">Dual scores</text>
    <rect x="602" y="550" width="180" height="50" rx="25" fill="#1E293B" stroke="#334155"/>
    <text x="692" y="581" text-anchor="middle" fill="#CBD5E1">Diversity radar</text>
    <rect x="812" y="550" width="180" height="50" rx="25" fill="#1E293B" stroke="#334155"/>
    <text x="902" y="581" text-anchor="middle" fill="#CBD5E1">Peach weights</text>
  </g>
</svg>
