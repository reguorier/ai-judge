<svg width="1120" height="620" viewBox="0 0 1120 620" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AI Judge v3.2 Tianfu-style auditable stack</title>
  <desc id="desc">Layered architecture showing human final authority, jury seats, evidence tracing, dissent challenge, reasoning tree, risk router, and local artifacts.</desc>
  <rect width="1120" height="620" rx="24" fill="#090B12"/>
  <rect x="32" y="32" width="1056" height="556" rx="18" fill="#101522" stroke="#26324A" stroke-width="2"/>

  <text x="560" y="76" text-anchor="middle" fill="#F4F7FB" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800">AI Judge v3.2</text>
  <text x="560" y="108" text-anchor="middle" fill="#AAB6CA" font-family="Inter, Arial, sans-serif" font-size="17">Evidence tracing + dissent challenge + reasoning tree + risk router</text>

  <g transform="translate(78 144)">
    <rect width="964" height="78" rx="14" fill="#172033" stroke="#3B82F6" stroke-width="2"/>
    <text x="482" y="34" text-anchor="middle" fill="#E9F1FF" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">Human-final Verdict</text>
    <text x="482" y="58" text-anchor="middle" fill="#9EB3D7" font-family="Inter, Arial, sans-serif" font-size="14">The system audits judgment quality. The human still holds the final decision.</text>
  </g>

  <g transform="translate(78 252)">
    <rect width="216" height="104" rx="14" fill="#111A2B" stroke="#8B5CF6" stroke-width="2"/>
    <text x="108" y="34" text-anchor="middle" fill="#F5F3FF" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700">9 AI Seats</text>
    <text x="108" y="60" text-anchor="middle" fill="#C8B8FF" font-family="Inter, Arial, sans-serif" font-size="13">Independent answers</text>
    <text x="108" y="82" text-anchor="middle" fill="#8EA0BD" font-family="Inter, Arial, sans-serif" font-size="12">Gemini / GPT / Qwen / Kimi / more</text>
  </g>

  <g transform="translate(326 252)">
    <rect width="216" height="104" rx="14" fill="#111A2B" stroke="#22C55E" stroke-width="2"/>
    <text x="108" y="34" text-anchor="middle" fill="#ECFDF5" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700">Evidence Objects</text>
    <text x="108" y="60" text-anchor="middle" fill="#A7F3D0" font-family="Inter, Arial, sans-serif" font-size="13">Tool, rule, harness, precedent</text>
    <text x="108" y="82" text-anchor="middle" fill="#8EA0BD" font-family="Inter, Arial, sans-serif" font-size="12">Every claim cites a source</text>
  </g>

  <g transform="translate(574 252)">
    <rect width="216" height="104" rx="14" fill="#111A2B" stroke="#F59E0B" stroke-width="2"/>
    <text x="108" y="34" text-anchor="middle" fill="#FFF7ED" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700">Dissent Agent</text>
    <text x="108" y="60" text-anchor="middle" fill="#FED7AA" font-family="Inter, Arial, sans-serif" font-size="13">Challenges weak evidence</text>
    <text x="108" y="82" text-anchor="middle" fill="#8EA0BD" font-family="Inter, Arial, sans-serif" font-size="12">Dissent before confidence</text>
  </g>

  <g transform="translate(822 252)">
    <rect width="216" height="104" rx="14" fill="#111A2B" stroke="#EF4444" stroke-width="2"/>
    <text x="108" y="34" text-anchor="middle" fill="#FEF2F2" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700">Risk Router</text>
    <text x="108" y="60" text-anchor="middle" fill="#FECACA" font-family="Inter, Arial, sans-serif" font-size="13">FullJury / Standard / FastCheck</text>
    <text x="108" y="82" text-anchor="middle" fill="#8EA0BD" font-family="Inter, Arial, sans-serif" font-size="12">Sensitive work gets deeper review</text>
  </g>

  <path d="M294 304H326" stroke="#5B6B86" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M542 304H574" stroke="#5B6B86" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M790 304H822" stroke="#5B6B86" stroke-width="2" marker-end="url(#arrow)"/>

  <g transform="translate(78 398)">
    <rect width="964" height="82" rx="14" fill="#121B2C" stroke="#38BDF8" stroke-width="2"/>
    <text x="482" y="34" text-anchor="middle" fill="#E0F2FE" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="700">Reasoning Tree</text>
    <text x="482" y="58" text-anchor="middle" fill="#A5D8F3" font-family="Inter, Arial, sans-serif" font-size="14">Facts -> Evidence -> Rules -> Dissent -> Conclusion, ready for UI rendering and IDE source jumps.</text>
  </g>

  <g transform="translate(78 512)">
    <rect width="964" height="42" rx="10" fill="#0C1220" stroke="#26324A" stroke-width="1"/>
    <text x="482" y="27" text-anchor="middle" fill="#AAB6CA" font-family="Inter, Arial, sans-serif" font-size="14">Local artifacts: claim-ledger.json, task-status.json, verdict.md, reasoning-tree JSON, harness reports</text>
  </g>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#5B6B86"/>
    </marker>
  </defs>
</svg>
