version: "3.8"

services:
  ai-judge:
    image: ghcr.io/reguorider-gif/ai-judge:latest
    container_name: ai-judge
    environment:
      - LICENSE_KEY=${LICENSE_KEY:-}
      - AI_JUDGE_ROOT=/data
    volumes:
      - ai_judge_data:/data
    network_mode: host
    stdin_open: true
    tty: true

volumes:
  ai_judge_data:
    driver: local
